name: Build ALL
run-name: Build ALL
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to upload artifacts to (leave empty for just build)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  Build_Android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - run: rm -rf /opt/hostedtoolcache
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: Decode and install certificate
        env:
          STORE_FILE: ${{ secrets.ANDROID_KEYSTORE }}
          PROPERTY_FILE: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: |
            echo "$STORE_FILE" | base64 --decode > android/keystore.jks
            echo "$PROPERTY_FILE" > android/key.properties
      - uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
      - name: Check rust-toolchain.toml
        run: rustup show
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/apk/release
  Build_Windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: install dependencies
        run: | 
          choco install yq -y
          pip install httpx
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          architecture: x64
      - name: build
        run: |
          flutter pub get
          python windows/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: build/windows/Venera-*
  Build_Linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version-file: pubspec.yaml
          architecture: x64
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - run: python3 debian/build.py x64
      - run: dart run flutter_to_arch
      - run: |
          sudo rm -rf build/linux/arch/app.tar.gz
          sudo rm -rf build/linux/arch/pkg
          sudo rm -rf build/linux/arch/src
          sudo rm -rf build/linux/arch/PKGBUILD
      - uses: actions/upload-artifact@v4
        with:
          name: deb_build
          path: build/linux/x64/release/debian
      - uses: actions/upload-artifact@v4
        with:
          name: arch_build
          path: build/linux/arch/
  Build_Linux_ARM64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          flutter-version-file: pubspec.yaml
      - run: |
          flutter pub get
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev webkit2gtk-4.1
          dart pub global activate -s git https://github.com/venera-app/flutter_to_debian.git
      - name: "Patch font"
        run: |
          dart run patch/font.dart
      - run: python3 debian/build.py arm64
      - uses: actions/upload-artifact@v4
        with:
          name: deb_arm64_build
          path: build/linux/x64/release/debian # This is a bug related to flutter_to_debian, but it's not a big deal.

  Release:
    runs-on: ubuntu-22.04
    needs: [Build_Android, Build_Windows, Build_Linux, Build_Linux_ARM64]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apks
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: windows_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: arch_build
          path: outputs
      - uses: actions/download-artifact@v4
        with:
          name: deb_arm64_build
          path: outputs
      - name: Upload to release
        env:
          TOKEN: ${{ secrets.ACTION_GITHUB_TOKEN }}
        run: python3 -c "
import os, glob, urllib.request, urllib.parse, json, sys

TOKEN = os.environ.get('TOKEN', '')
TAG = '${{ inputs.tag_name || github.ref_name }}'
print(f'Uploading artifacts to release: {TAG}')

# Get release ID
url = f'https://api.github.com/repos/DAZING-FOR/venera/releases/tags/{urllib.parse.quote(TAG, safe=\"\")}'
req = urllib.request.Request(url)
req.add_header('Authorization', f'Bearer {TOKEN}')
try:
    resp = urllib.request.urlopen(req)
    RELEASE_ID = json.load(resp)['id']
except Exception as e:
    print(f'⚠️ API failed ({e}), using hardcoded ID...')
    RELEASE_ID = 357864414

print(f'Release ID: {RELEASE_ID}')

# Upload each file
for filepath in sorted(glob.glob('outputs/*')):
    if not os.path.isfile(filepath):
        continue
    fname = os.path.basename(filepath)
    upload_url = f'https://uploads.github.com/repos/DAZING-FOR/venera/releases/{RELEASE_ID}/assets?name={urllib.parse.quote(fname)}'
    print(f'  Uploading {fname}...', end=' ')
    sys.stdout.flush()
    try:
        with open(filepath, 'rb') as f:
            data = f.read()
        req = urllib.request.Request(upload_url, data=data, method='POST')
        req.add_header('Authorization', f'Bearer {TOKEN}')
        req.add_header('Content-Type', 'application/octet-stream')
        resp = urllib.request.urlopen(req)
        print(f'HTTP {resp.getcode()} ✅')
    except Exception as e:
        print(f'❌ {e}')

print('✅ Done')
"
